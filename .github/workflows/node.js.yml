name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: npm ci
      - run: npm run build --if-present
      - run: npm run test -- --coverage

      - name: Coverage report
        uses: davelosert/vitest-coverage-report-action@v2
